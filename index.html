<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>安全運転サイネージ</title>
  <meta http-equiv="Content-Script-Type" content="text/javascript">
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 1920px;
      height: 1080px;
      background-color: #ffffff;
      font-family: "メイリオ", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: start;
    }

    .main-days {
      margin-top: 60px;
      color: #3399cc;
      font-style: italic;
    }

    .label {
      font-size: 150px;
      font-weight: bold;
    }

    .days-num {
      font-size: 200px;
      font-weight: bold;
    }

    .region-days {
      font-size: 36px;
      color: #555;
      margin-top: -20px;
      letter-spacing: 8px;
    }

    .today-date {
      font-size: 48px;
      font-weight: bold;
      color: #008b8b;
      margin-top: 60px;
    }

    .slogan1 {
      font-size: 48px;
      color: #008b8b;
      text-align: center;
      margin: 20px 120px -20px 60px;
    }

    .slogan2 {
      font-size: 30px;
      color: #2f4f4f;
      text-align: center;
      margin: 0 120px;
    }

    .wednesday {
      text-align: center;
      margin-top: 40px;
    }

    .wed-head {
      font-size: 36px;
      color: #e95388;
    }

    .wed-main {
      font-size: 48px;
      font-weight: bold;
      background: #ffff00;
      color: #ff007f;
      text-shadow: 2px 2px 1px #e6afcf;
    }

    .wed-note {
      font-size: 28px;
      color: #8a2be2;
    }

    /* 水曜日モード用の調整 */
    body.wednesday-mode .slogan1 {
      font-size: 36px;
      margin: 30px 80px -30px 80px;
    }

    body.wednesday-mode .slogan2 {
      font-size: 24px;
      margin: 0 80px;
      line-height: 1.3;
    }

    body.wednesday-mode .wed-note {
      font-size: 24px;
    }
  </style>
  <script>
    const xday0 = new Date(2026, 4-1, 6); // 無事故
    const xday1 = new Date(2026, 4-1, 6); // 鹿児島
    const xday2 = new Date(2025, 12-1, 9);  // 宮崎
    const xday3 = new Date(2026, 3-1, 10); // 熊本
    const xday4 = new Date(2025, 10-1, 15);  // 大分

    const slogan = {
  "slogan1" : "　右左折時　しっかり確認　横断歩道,<br/>右左折する時には、横断歩道に歩行者がいないか、また自転車などが後方から走り込んで来ないかを十分に確認するようにしてください。特に車体の大きな車は死角が大きくなり、歩行者などを見落とす危険も増えるため注意しましょう。",
 "slogan2" : "　車間距離　あと少しだけ　広くとろう,<br/>運転に慣れてくると、車間距離をだんだんと詰めるようになってきます。そのうち、短い車間距離が当たり前になって、それが自分の間隔になってしまいますので、普段から意識して、車間距離を広く開けることが大切です。",
 "slogan3" : "　天気予報　運転前に　確認を,<br/>運転する前には天気予報を確認してください。「今日は何時ころから雨だな」などとイメージできると、雨の危険に対して備える気持ちが生まれ、場合によっては運行経路を変更するなどして、危険を回避することができます。",
 "slogan4" : "　交通ルール　見本となって　しっかり守ろう,<br/>まもなく入学シーズンを迎えます。大人は、歩行者であっても運転者であっても、交通ルールをしっかりと守り、子供の見本となりましょう。大人がしっかりと交通ルールを守っていると、子供も危険な行動をとることは少なくなるはずです。",
 "slogan5" : "　間違った　慌てず　左折で戻ります,<br/>目的地や曲がりたい交差点を誤って通りすぎてしまった場合には、その場でUターンを試みるのではなく、慌てずに次の交差点で左折するなどして、経路を回復しましょう。慌てて行動すると、事故を起こす可能性が高くなるので注意してください。",
 "slogan6" : "　短気は損気　運転時にも　余裕を持とう,<br/>「短期は損気」と言われますが、それは運転においても同じです。割込みにいらっとしてあおり運転をしたり、強引に交差点を右折したりすると、結局、事故を起こして困るのはあなたです。運転する際にも、気持ちにゆとりを持つことを忘れないで下さい。",
 "slogan7" : "　高速道路　まさかの事故が　発生します,<br/>高速道路上で、歩行者と衝突する「まさかの事故」がたびたび発生しています。運転中は前方をしっかりと見て運転してください。そして、故障者等を見かけた際には、その周辺に歩行者がいることを予測し、警戒しながら運転しましょう。",
 "slogan8" : "　生活道路　抜け道利用は　事故のもと,<br/>皆さんは、生活道路等の狭い道を抜け道として利用していませんか？　抜け道を利用すると、目的地までの到着時間を多少は短縮できるかもしれません。しかし、狭い道路は事故と隣り合わせであり、事故を起こすと目的地には到着できませんので、生活道路の抜け道利用は止めましょう。",
 "slogan9" : "　山道の　センターライン　しっかり守ろう,<br/>山道で、センターラインをはみ出したことによる正面衝突が発生しています。山道ではショートカットのためにセンターラインを無視する車を見かけますが、そのような際に対向車が現れないとは限りません。ハンドル操作がしっかりとできる速度で、センターラインをしっかりと守って運転しましょう。",
 "slogan10" : "　通学路　速度落として　安全運転,<br/>通学路では、学生・児童の安全確保を最優先に、速度を落として走行しましょう。歩行者の側方を通過する際には、側方間隔を十分に確保することも重要です。このほか、見通しの悪い場所では、飛出しを警戒しながら運転してください。",
 "slogan11" : "　事故発生　悲しむ家族　想像しよう,<br/>万が一、交通事故を起こしてしまうと、困ってしまうのはドライバーだけではありません。あなたの周りにいる家族も、悲しむことになります。自分の大切な人を悲しませることがないよう、日々、安全運転に努めてください。",
 "slogan12" : "　ヘルメット　しっかりかぶって　命を守ろう,<br/>自転車で事故を起こした際、ヘルメットをかぶっていなかった場合の致命傷率は、かぶっていた場合と比較して約2.4倍も高くなっています。自転車のヘルメット着用が義務化され１年が経ちましたが、まだまだかぶっていない人も見かけますので、しっかりと着用していきましょう。",
 "slogan13" : "　キックボード　車道での事故　多発中,<br/>電動キックボードの事故の約８割が、車道で発生しています。キックボード側の交通違反としては、信号無視や一時不停止が多くを占めていますので、交差点を走行する際には、こうした交通ルールを守らないキックボード利用者がいることを頭に入れて、防衛運転に徹しましょう。",
 "slogan14" : "　警戒しよう　自転車に乗る　高校生,<br/>４月から６月にかけて、自転車に乗る高校生との事故が増える傾向にあります。通学路では自転車の飛出しや急な進路変更に注意するほか、自転車を追い越す際には、側方間隔を十分に確保することを心がけましょう。",
 "slogan15" : "　横断歩道　歩行者見たら　必ず停止,<br/>横断歩道上で歩行者がはねられる事故があとを絶ちませんが、事故を起こした車の約９割が、横断歩道の手前で減速していないようです。横断歩道を横断していたり、横断しようとしている人を見かけた場合は、必ず一時停止することを徹底しましょう。",
 "slogan16" : "　生活道路　子供の飛出し　予測しよう,<br/>春の全国交通安全運動が始まりました。子供との事故は、見通しの悪い交差点で多発しています。生活道路等、狭くて見通しの悪い交差点を走行する際には、子供が飛び出してくることを前提に、速度を落として慎重に運転してください。",
 "slogan17" : "　前車のブレーキ　安易に抜かず　危険を予測,<br/>前車がブレーキをかけたため車線を変更して追い越そうとしたところ、歩行者が現れ、衝突する事故が発生しました。前車が急に減速した際には、安易に追い越そうとするのではなく、「何かがあるのかもしれない」と危険を察知して、落ち着いて対処するようにしてください。",
 "slogan18" : "　車線変更　ウインカーは　３秒前,<br/>車線変更する時に、だたウインカーを出せばいいと考えている人もいるようですが、周囲が行動を把握するために、３秒前にウインカーを出しましょう。常に後続車をはじめとした周辺の車に気を使う運転を心がけてください。",
 "slogan19" : "　上向きライトで　遠くの歩行者　みつけよう,<br/>夜間、下向きライトで走行していると40メートル先しか確認することができませんが、上向きライトだと100メートル先までの確認が可能になります。夜間走行時は前方の視界確保が大切ですので、積極的に上向きライトに切り替えましょう。",
 "slogan20" : "　わき見しない　強い意志を　持ちましょう,<br/>交通事故の大きな原因の一つに「わき見」が挙げられます。運転席からわき見の原因となるスマホ等を遠ざける、風景や看板に気をとられないようにするなど、「絶対にわき見をしない」という強い意思を持つようにしましょう。",
 "slogan21" : "　車間距離　詰めると後悔　することに,<br/>隣車線の車が自車の前に入ってきそうなときなど、つい嫌がって前車との車間距離を詰めていませんか？　そういうときに隣にばかり意識が向いてしまうと、前車が減速した際、追突してしまう恐れがあります。後悔しないためにも、車間距離はしっかりあけましょう。",
 "slogan22" : "　カーブでの　速度の出しすぎ　要注意,<br/>全国各地で、毎日のように車が横転するニュースを目にします。車の性能や自分自身の運転技術を過信せず、安全運転の基本にあるように、カーブの手前でしっかりと減速したうえで進入することを心がけましょう。",
 "slogan23" : "　駐車時は　クリープ現象　活用しよう,<br/>駐車場でのアクセルとブレーキの踏み間違いによる事故が年齢を問わずに発生しています。駐車場内で前進、後退する際にはクリープ現象を利用して、歩行者など周囲に気を配りながら低速で行いましょう。",
 "slogan24" : "　運転中　スマホではなく　前みよう,<br/>スマホで動画をみていたために、道路を横断していた自転車を見落とし、衝突する事故が起きています。運転中は刻一刻と状況が変化します。スマホには目もくれず、しっかりと前を見て運転に集中してください。",
 "slogan25" : "　レジャーでも　飲むなら乗らない　絶対に,<br/>大型連休が始まります。レジャー時にはつい気が緩みがちになります。「ちょっとだけ……」と飲酒してしまうことがないように、休みに入るまえに「飲んだら乗らない」ことを周知して、飲酒運転の防止を図りましょう。",
 "slogan26" : "　飲酒した　その翌日の　運転注意,<br/>飲酒した翌日は、たとえ酒気が残っていなくても、体がだるく感じたり、パフォーマンスが落ちると感じる人も少なくないようです。翌日、運転することがわかっている場合は、飲酒を控えることを心がけましょう。",
 "slogan27" : "　高架下　通過の前に　高さを意識,<br/>高架下をくぐる際に、積み荷が橋脚等にひっかかる事故がたびたび発生しています。荷物を載せて運転する際には、まずは荷物を積んでいることを忘れないようにするとともに、積荷の高さもしっかりと把握して、走行ルートにも配慮しましょう。",
 "slogan28" : "　再確認　トンネル内は　駐停車禁止,<br/>トンネル内は、駐停車が禁止されています。アクシデントが発生した場合には、できるだけトンネル外に出るか、非常駐車帯に入るように努力しましょう。やむを得ず停止した場合は、後続車に停止を知らせるために停止表示器材を設置してください。",
 "slogan29" : "　EVの　アクセル操作に　要注意,<br/>近年、普及の進む電気自動車ですが、ガソリン車と同じような感覚でアクセルを操作してしまうと、予期せぬ事故を起こすおそれがあります。EVは加速の反応がよいため、駐車する際などには、アクセル操作を慎重に行ってください。",
 "slogan30" : "　高速運転　車間と速度が　重要です,<br/>高速道路等での多重事故が後を絶ちません。多重事故を防止するためには、車間距離をしっかりと確保して、速度を出しすぎないように運転することが重要です。そして、わき見をせず、しっかりと前をみて運転しましょう。",
 "slogan31" : "　AED　もしもに備えて　場所を把握,<br/>救命時に欠かすことのできないAED（自動体外式除細動器）ですが、普段、業務を行うなかで、一番近い設置場所はパッと思い浮かびますか？　いざという時にすぐに使用できるように、設置場所と使い方を確認しておきましょう。"
    };

    function getDays(startDate) {
      const now = new Date();
      return Math.floor((now - startDate) / (1000 * 60 * 60 * 24));
    }

    function start() {
      const mainNum = getDays(xday0);
      document.getElementById("mainDays").innerHTML =
        `<span class="label">無事故 </span><span class="days-num">${mainNum}</span><span class="label"> 日継続</span>`;

      document.getElementById("regionDays").innerHTML =
        `【鹿：${getDays(xday1)}日】 【宮：${getDays(xday2)}日】 【熊：${getDays(xday3)}日】 【大：${getDays(xday4)}日】`;

      const now = new Date();
      const yobi = ["日", "月", "火", "水", "木", "金", "土"][now.getDay()];
      document.getElementById("dateToday").innerHTML =
        `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日（${yobi}）`;

      const day = now.getDate();
      const sloganKey = "slogan" + ((day - 1) % 31 + 1); // 1〜31循環
      const split = slogan[sloganKey]?.split(",") || ["安全第一", "標語データが見つかりません"];

      document.getElementById("slogan1").innerHTML = split[0];
      document.getElementById("slogan2").innerHTML = split[1];

      if (now.getDay() === 3) {
        document.body.classList.add("wednesday-mode");
        document.getElementById("wednesday1").innerHTML = "■水曜日は";
        document.getElementById("wednesday2").innerHTML = "定時退社推奨日";
        document.getElementById("wednesday4").innerHTML = "月4回の早帰りを目標としております。社員全員が目標達成できるよう努めてまいりましょう。";
      }
    }
  </script>
</head>
<body onload="start()">
  <div class="main-days" id="mainDays"></div>
  <div class="region-days" id="regionDays"></div>
  <div class="today-date" id="dateToday"></div>
  <div class="slogan1" id="slogan1"></div>
  <div class="slogan2" id="slogan2"></div>
  <div class="wednesday">
    <div class="wed-head" id="wednesday1"></div>
    <div class="wed-main" id="wednesday2"></div>
    <div class="wed-head" id="wednesday3"></div>
    <div class="wed-note" id="wednesday4"></div>
  </div>
</body>
</html>
